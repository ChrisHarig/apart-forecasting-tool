services:
  api:
    build: .
    environment:
      SENTINEL_DATABASE_URL: postgresql+psycopg://sentinel:sentinel@db:5432/sentinel_atlas
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel_atlas
    ports:
      - "5432:5432"
    volumes:
      - sentinel-postgres:/var/lib/postgresql/data

volumes:
  sentinel-postgres:

