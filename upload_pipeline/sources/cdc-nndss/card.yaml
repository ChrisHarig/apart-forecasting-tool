tags:
  - cadence-weekly
  - geo-us
  - surveillance-notifiable
  - tier-1
  - availability-open

schema_version: "0.1"
source_id: cdc-nndss
source_url: https://data.cdc.gov/NNDSS/NNDSS-Weekly-Data/x9gk-5huc
manifest_section: "§2.1"

surveillance_category: notifiable
pathogens:
  - influenza
  - sars-cov-2
  - rsv
  - pertussis
  - measles
  - mumps
  - rubella
  - mpox
  - dengue
  - zika
  - chikungunya
  - west-nile
  - cholera
  - tuberculosis
  - lyme
  - leptospirosis
  - salmonella
  - listeria
  - e-coli-stec
  - campylobacter
  - shigella
  - hepatitis-a
  - hepatitis-b
  - hepatitis-c
  - legionella
  - q-fever
  - anthrax
  - botulism
  - hansens-disease
  - hand-foot-mouth
  - varicella
  - malaria
  - yellow-fever
  - polio
  - hiv
  - unknown

availability: open
availability_notes: null
access_type: socrata
tier: 1

cadence: weekly
geography_levels:
  - national
  - subnational-state
geography_countries:
  - US

gold_standard_for: []
vintaged_version_of: null
succeeds: null
derived_from: []

value_columns:
  - name: count
    unit: cases/week
    value_type: incident
    description: NNDSS current-week count (`m2`) for this (date, location, condition)
    aggregation: sum

notes:
  extra_columns:
    - column: condition_native
      description: NNDSS label as published (e.g. 'Arboviral diseases, Chikungunya virus disease'). `condition` is the EPI-Eval slug.
    - column: location_name
      description: NNDSS jurisdiction name. `location_id` is FIPS / `US`.
    - column: m2_flag
      description: NNDSS flag for `m2` (e.g. `-` = zero, `U` = unavailable, `N` = not notifiable in this jurisdiction).
  interpretation_caveats:
    - column: condition
      caveat: |
        ~30 NNDSS labels are mapped to EPI-Eval pathogen slugs; the rest fall through to
        `condition: unknown`. Use `condition_native` for source-fidelity work and
        contribute label→slug mappings as the vocab grows.
    - column: count
      caveat: |
        m2 is the *provisional* current-week count. NNDSS revises weeks for ~4 quarters
        before finalising. For finalised data use the annual NNDSS summary tables.
        `m2_flag` of `U` or `N` mean "no value should exist" — these are NaN'd by `to_numeric`.
  general: |
    NNDSS forces the long-format pattern (one row per condition); 120+ conditions in a
    single feed makes wide format impossible. The schema's row-level `condition` +
    `condition_type` columns handle this — see schema v0.1 "Long-format / case-register data".

extra:
  source_columns_omitted: 5 (m1, m1_flag, m3_flag, m4_flag, sort_order, geocode — additional context windows the dashboard rarely uses; can be added to extra columns later)
  unmapped_label_count: see ingest.py — unmapped labels currently fall through to condition='unknown'
