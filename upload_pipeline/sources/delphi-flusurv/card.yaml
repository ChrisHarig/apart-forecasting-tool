notes:
  extra_columns:
    - column: location_name
      description: Source-native catchment code (e.g. `CA`, `NY_albany`, `network_all`). `location_id` prefixes with `US-FLUSURV-`.
  interpretation_caveats:
    - column: rate_overall
      caveat: |
        FluSurv-NET catchments are *not* whole-state populations. CA covers selected counties
        in the SF Bay Area; NY has separate Albany and Rochester catchments. Don't compare
        catchment rates to state-level flu rates from other sources without re-weighting.
  general: |
    14 RESP-NET catchments (some states host two — NY: Albany + Rochester) plus a `network_all`
    aggregate. Seasonal — typically populated October through May. Pre-2018 the network was
    smaller (FluSurv-NET predecessors operated different sites).
