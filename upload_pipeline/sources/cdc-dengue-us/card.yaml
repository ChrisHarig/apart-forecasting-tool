notes:
  general: |
    STUB. CDC's dengue dashboard renders client-side from embedded JSON and lacks a
    documented endpoint. Until CDC publishes an API or static CSV, NNDSS
    (`cdc-nndss`) is the better source — its arboviral labels include dengue and
    cover all NNDSS-reporting jurisdictions weekly.
