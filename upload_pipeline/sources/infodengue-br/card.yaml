pretty_name: InfoDengue (Brazil) — STUB (auth required)
license: cc-by-4.0
size_categories:
  - 1M<n<10M
tags:
  - cadence-weekly
  - geo-br
  - surveillance-arboviral
  - pathogen-dengue
  - pathogen-chikungunya
  - pathogen-zika
  - tier-1
  - availability-gated

schema_version: "0.1"
source_id: infodengue-br
source_url: https://api.mosqlimate.org/
manifest_section: "§6.3"

surveillance_category: arboviral
pathogens:
  - dengue
  - chikungunya
  - zika

availability: gated
availability_notes: "Mosqlimate API requires X-UID-KEY authentication. Free registration."
access_type: api
tier: 1

cadence: weekly
geography_levels:
  - subnational-county
geography_countries:
  - BR

gold_standard_for: []
vintaged_version_of: null
succeeds: null
derived_from: []

value_columns:
  - name: casos
    unit: cases/week
    value_type: incident
    description: Reported dengue cases (raw)
    aggregation: sum
  - name: casos_est
    unit: cases/week
    value_type: incident
    description: Nowcast-corrected cases (InfoDengue's primary signal)
    aggregation: sum
  - name: p_rt1
    unit: probability (0-1)
    value_type: proportion
    description: Probability that the effective reproduction number exceeds 1
    aggregation: mean
  - name: p_inc100k
    unit: cases per 100k population
    value_type: rate
    description: Incidence rate per 100k
    aggregation: rate
  - name: Rt
    unit: dimensionless
    value_type: index
    description: Estimated effective reproduction number
    aggregation: mean

notes:
  extra_columns:
    - column: location_id_native
      description: IBGE 7-digit municipality code. `location_id` prefixes with `BR-IBGE-`.
    - column: location_name
      description: Municipality name in Portuguese.
  general: |
    InfoDengue is the model output (nowcast); the upstream raw cases are SINAN.
    The schema's `derived_from: [datasus-sinan]` should fill in once the SINAN ingest exists.
extra:
  schema_proposal: |
    `derived_from` is currently empty because the upstream SINAN feed isn't ingested yet.
    Add it once `datasus-sinan` lands.
