# Long-format-by-condition + wide-by-metric. Each row is one (date, England,
# condition); each metric column has a single coherent unit. Cells are NaN
# where the source doesn't publish that metric for that condition.
value_columns:
  - name: positivity
    unit: percent (0-100)
    value_type: proportion
    description: |
      Share of specimens positive for the condition, weekly. Flu and RSV
      values are direct weekly counts; COVID is the 7-day-rolling daily
      series resampled to Saturday week-end (see caveat).
    aggregation: rate
  - name: admission_rate
    unit: per 100k population
    value_type: rate
    description: Weekly hospital admission rate per 100k. Flu + RSV only; COVID NaN.
    aggregation: rate
  - name: icu_admission_rate
    unit: per 100k population
    value_type: rate
    description: Weekly ICU/HDU admission rate per 100k. Flu only.
    aggregation: rate
  - name: ili_survey_rate
    unit: per 100k population
    value_type: rate
    description: |
      Weekly ILI cases per 100k from the UKHSA primary-care symptom survey.
      Flu only (it's an ILI-survey measurement; the syndrome is reported
      under the influenza topic on UKHSA's side).
    aggregation: rate
  - name: survey_participants
    unit: respondents/week
    value_type: incident
    description: ILI survey weekly participant count (denominator-quality indicator). Flu only.
    aggregation: sum

notes:
  extra_columns:
    - column: condition_native
      description: UKHSA topic name (`Influenza`, `COVID-19`, `RSV`).
    - column: location_name
      description: "Always 'England' for this v0.1 ingest. NHS regions and devolved nations would be separate sources."
  interpretation_caveats:
    - column: positivity
      caveat: |
        COVID positivity comes from `COVID-19_testing_positivity7DayRolling` — a daily
        7-day-rolling number — resampled to Saturday week-end. Flu and RSV positivity
        are direct weekly observations. The unit is the same (%) but the smoothing
        upstream is different; treat the COVID column as smoother by construction.
    - column: ili_survey_rate
      caveat: |
        Self-reported ILI survey, not lab-confirmed. Useful as a covariate for the
        flu-related rows but not a target.
    - column: admission_rate
      caveat: |
        Source-published per-100k weekly rate. UKHSA's denominator population is
        England-resident and updates annually; rates across multi-year boundaries
        carry small denominator drift.
  general: |
    Three pathogens, one wide-by-metric table keyed by (date, condition). UKHSA's
    daily COVID-only metrics (admissions/day, cases/day, occupied beds/day, ONS
    deaths/day) are intentionally excluded — they don't share units with the
    flu/RSV weekly per-100k rates and would belong in a sibling
    `ukhsa-covid-daily` source. England-only; NHS regions / devolved nations
    reachable through the same API by varying `geography_types` and `geographies`.

extra:
