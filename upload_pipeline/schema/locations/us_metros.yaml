# US metro / sub-state catchment registry.
#
# Sub-state geographies don't have a global standard (ISO 3166-2 stops at
# state level). For US metros and similar non-FIPS aggregations we use the
# synthetic prefix `US-METRO-<id>` (per schema_v0.1 location-id rules).
# This file is the canonical mapping from synthetic id → display name for
# every metro / catchment / sub-state aggregate the org's datasets reference.
#
# Adding a metro: PR against this file. The synthetic id should be a stable
# slug (uppercase, alphanumeric + hyphens) — it does NOT need to match an
# external standard.

schema_version: "0.1"

codes:
  # MetroCast hub metros (extracted 2026-04-26 from flu-metrocast-hub.parquet).
  # The hub mixes city-level and state-level series under one prefix; the
  # display name reflects the hub's source name. Sub-state aggregates that
  # happen to be state-named (e.g. 'Texas', 'Georgia') are MetroCast's
  # state-wide aggregate row, not duplicates of state FIPS data.
