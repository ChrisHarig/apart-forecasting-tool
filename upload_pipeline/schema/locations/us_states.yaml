# US state / territory / DC FIPS registry.
#
# 2-digit FIPS code → human-readable name. Used by the validator (advisory:
# warns if a row's location_id at level subnational-state isn't in this list,
# but doesn't hard-fail — there are legitimate non-listed jurisdictions for
# US territories and federal-region constructs).
#
# Adding a new code is a PR against this file. ISO sub-state for non-US
# jurisdictions lives in country-specific files in this same directory
# (e.g. br_states.yaml, ca_provinces.yaml, gb_nations.yaml).

